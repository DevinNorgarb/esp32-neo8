; ESP-01 + u-blox NEO-8M GPS
; https://docs.platformio.org/en/latest/platforms/espressif8266.html

[env:esp01_1m]
platform = espressif8266
board = esp01_1m
framework = arduino
monitor_speed = 115200
upload_speed = 115200

lib_deps =
    mikalhart/TinyGPSPlus@^1.1.0

build_flags =
    ; GPIO0 = GPS TX in (ESP RX), GPIO2 = GPS RX in (ESP TX)
    -D GPS_RX_PIN=0
    -D GPS_TX_PIN=2
    -D GPS_BAUD=9600

[env:esp32_doit_devkit_v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    mikalhart/TinyGPSPlus@^1.1.0

build_flags =
    ; Default ESP32 UART2 pins (commonly GPIO16=RX, GPIO17=TX)
    -D GPS_RX_PIN=16
    -D GPS_TX_PIN=17
    -D GPS_BAUD=9600

[env:nodemcu_32s]
platform = espressif32
; AI-Thinker NodeMCU-32 V1.2 (classic ESP32, not ESP32-S3)
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    mikalhart/TinyGPSPlus@^1.1.0

build_flags =
    ; Right-side header: P25 (RX) + P26 (TX) — opposite from P16/P17 on left
    -D GPS_RX_PIN=25
    -D GPS_TX_PIN=26
    -D GPS_BAUD=9600

[env:nodemcu_esp32_s3]
platform = espressif32
; PlatformIO board name for "NodeMCU ESP32-S3" can vary by package/version.
; This maps to the common ESP32-S3 DevKitC definition.
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    mikalhart/TinyGPSPlus@^1.1.0

build_flags =
    ; UART pins for GPS over Serial2 on ESP32-S3.
    ; If your wiring uses different pins, override these in build_flags.
    -D GPS_RX_PIN=16
    -D GPS_TX_PIN=17
    -D GPS_BAUD=9600
