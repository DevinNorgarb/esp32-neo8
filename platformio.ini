; ESP-01 + u-blox NEO-8M GPS
; https://docs.platformio.org/en/latest/platforms/espressif8266.html

[env:esp01_1m]
platform = espressif8266
board = esp01_1m
framework = arduino
monitor_speed = 115200
upload_speed = 115200

lib_deps =
    mikalhart/TinyGPSPlus@^1.1.0

build_flags =
    ; GPIO0 = GPS TX in (ESP RX), GPIO2 = GPS RX in (ESP TX)
    -D GPS_RX_PIN=0
    -D GPS_TX_PIN=2
    -D GPS_BAUD=9600
